<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Thiết Bị Công Nghệ - E-Tech Store</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Product Page Layout */
        .products-page-container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
        }

        /* Sidebar Filters */
        .filters-sidebar {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            height: fit-content;
            position: sticky;
            top: 100px;
            box-shadow: var(--shadow-sm);
        }

        .filter-group {
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .filter-group:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .filter-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .filter-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-main);
        }

        .filter-item input[type="checkbox"],
        .filter-item input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* Category pills in sidebar */
        .category-filter-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            text-align: left;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            color: var(--text-main);
        }

        .category-filter-btn.active {
            background-color: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Results Area */
        .results-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .results-title-bar h2 {
            font-size: 24px;
            font-weight: 800;
        }

        .results-count {
            font-size: 14px;
            color: var(--text-muted);
        }

        .sort-select-wrapper select {
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background-color: var(--card-bg);
            color: var(--text-main);
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .active-filters-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .active-filter-pill {
            background-color: var(--primary-light);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .clear-filters-btn {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: none;
            padding: 6px;
        }

        .clear-filters-btn:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        /* Products Grid */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .empty-state {
            grid-column: 1 / -1;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 60px 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .empty-state i {
            font-size: 64px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Premium Category Hero and Cards */
        .category-hero-section {
            grid-column: 1 / -1;
            text-align: center;
            padding: 10px 0 25px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 15px;
        }

        .cat-hero-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 8px;
            font-family: 'Outfit', sans-serif;
        }

        .cat-hero-desc {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 24px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .category-cards-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
            overflow-x: auto;
            padding: 5px;
            scrollbar-width: none;
        }
        
        .category-cards-wrapper::-webkit-scrollbar {
            display: none;
        }

        .category-cards-grid {
            display: flex;
            gap: 20px;
            flex-wrap: nowrap;
            justify-content: center;
        }

        .category-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px;
            width: 140px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .category-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }

        .category-card.active {
            border-color: var(--primary);
            background-color: var(--primary-light);
            box-shadow: var(--shadow-md);
        }

        .category-card-image-box {
            width: 116px;
            height: 140px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background-color: var(--light);
        }

        .category-card-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .category-card:hover .category-card-image-box img {
            transform: scale(1.08);
        }

        .category-card-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            margin-top: 4px;
            font-family: 'Inter', sans-serif;
        }
        
        .category-card.active .category-card-title {
            color: var(--primary);
        }

        .show-more-wrapper {
            margin-top: 15px;
        }

        .show-more-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 20px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 9999px;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-sm);
        }

        .show-more-btn:hover {
            background-color: var(--light);
            border-color: var(--text-muted);
        }
        
        .filter-item-muted {
            font-size: 13px;
            color: var(--text-muted);
            font-style: italic;
            padding: 5px 0;
        }

        @media (max-width: 900px) {
            .products-page-container {
                grid-template-columns: 1fr;
            }
            .filters-sidebar {
                position: static;
            }
            .category-cards-grid {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

    <!-- Header Navigation (Etsy Inspired) -->
    <custom-header></custom-header>

    <!-- Main Products Directory Container -->
    <main class="products-page-container">
        
        <!-- Premium Category Card Filter Section (Full Width at Top of Grid) -->
        <section class="category-hero-section">
            <h1 class="cat-hero-title" id="cat-hero-title">Tất cả thiết bị công nghệ</h1>
            <p class="cat-hero-desc" id="cat-hero-desc">Khám phá và trải nghiệm các thiết bị công nghệ đỉnh cao trước khi sở hữu</p>
            
            <div class="category-cards-wrapper">
                <div class="category-cards-grid" id="category-cards-grid">
                    <!-- Javascript will render cards here -->
                </div>
            </div>
            
            <div class="show-more-wrapper" id="show-more-wrapper" style="display: none;">
                <button class="show-more-btn" id="show-more-categories-btn">
                    Xem thêm (<span id="more-categories-count">0</span>)
                </button>
            </div>
        </section>

        <!-- Sidebar Filters -->
        <aside class="filters-sidebar">
            <!-- Brand/Manufacturer selector -->
            <div class="filter-group">
                <h4 class="filter-title">Hãng sản xuất</h4>
                <div class="filter-list" id="brand-filter-list">
                    <!-- Dynamic brands list -->
                </div>
            </div>

            <!-- Dynamic Tag Filters based on category -->
            <div class="filter-group" id="tags-filter-group" style="display: none;">
                <h4 class="filter-title">Bộ lọc đặc tính</h4>
                <div class="filter-list" id="dynamic-tags-list">
                    <!-- Javascript will inject filters here -->
                </div>
            </div>

            <!-- Rental/Buy options filter -->
            <div class="filter-group">
                <h4 class="filter-title">Hình thức</h4>
                <div class="filter-list">
                    <label class="filter-item">
                        <input type="checkbox" id="filter-trial-only">
                        <span>Hỗ trợ dùng thử trước khi mua</span>
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" id="filter-in-stock">
                        <span>Chỉ hiện sản phẩm còn hàng</span>
                    </label>
                </div>
            </div>
        </aside>

        <!-- Catalog Section -->
        <section class="catalog-section">
            
            <!-- Sorting and Result Header -->
            <div class="results-header-row">
                <div class="results-title-bar">
                    <h2 id="catalog-title">Tất cả thiết bị công nghệ</h2>
                    <span class="results-count" id="catalog-results-count">Đang tải sản phẩm...</span>
                </div>
                
                <div class="sort-select-wrapper">
                    <select id="sort-select">
                        <option value="default">Sắp xếp: Mặc định</option>
                        <option value="rent-asc">Giá thuê: Thấp đến Cao</option>
                        <option value="rent-desc">Giá thuê: Cao đến Thấp</option>
                        <option value="buy-asc">Giá mua đứt: Thấp đến Cao</option>
                        <option value="buy-desc">Giá mua đứt: Cao đến Thấp</option>
                    </select>
                </div>
            </div>

            <!-- Active filter chips -->
            <div class="active-filters-row" id="active-filters-row" style="display: none;">
                <!-- Filter chips will go here dynamically -->
                <button class="clear-filters-btn" id="clear-all-filters-btn">Xóa tất cả</button>
            </div>

            <!-- Grid catalog -->
            <div class="catalog-grid" id="catalog-grid">
                <!-- Products injected dynamically -->
            </div>
        </section>

    </main>


    <!-- Footer -->
    <custom-footer></custom-footer>

    <!-- Scripts -->
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
